<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Gift - GiftOnScreen</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>

<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>GiftOnScreen</h1>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>Create a New Gift</h2>

            <form id="createGiftForm">
                <div class="form-group">
                    <label for="receiver">Receiver's Name *</label>
                    <input type="text" id="receiver" name="receiver" required placeholder="e.g., Sarah">
                </div>

                <div class="form-group">
                    <label for="sender">Your Name *</label>
                    <input type="text" id="sender" name="sender" required placeholder="e.g., John">
                </div>

                <div class="form-group">
                    <label for="message">Your Message *</label>
                    <textarea id="message" name="message" required
                        placeholder="Write your heartfelt message here..."></textarea>
                </div>

                <div class="form-group">
                    <label for="photos">Upload Photos (Optional)</label>
                    <input type="file" id="photos" name="photos" accept="image/*" multiple
                        style="padding: 0.5rem; border: 2px dashed #ccc; border-radius: 8px; cursor: pointer;">
                    <small style="color: #666; display: block; margin-top: 0.5rem;">You can upload up to 5
                        photos</small>
                    <div id="photoPreview" style="display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap;"></div>
                    <div id="uploadProgress" style="display: none; margin-top: 0.5rem;">
                        <progress id="progressBar" value="0" max="100" style="width: 100%;"></progress>
                        <span id="progressText">Uploading...</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Preview Gift</button>
            </form>

            <div id="message" class="message hidden"></div>
        </div>
    </div>

    <script type="module" src="./js/create.js"></script>
</body>

</html>
