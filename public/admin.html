<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GiftOnScreen</title>
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        .admin-header {
            background: #1f2937;
            color: #fff;
        }

        .admin-header h1 {
            color: #fbbf24;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #6366f1;
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .request-list {
            display: grid;
            gap: 1rem;
        }

        .request-item {
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #f59e0b;
        }

        .request-item.processed {
            border-left-color: #10b981;
            opacity: 0.7;
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .request-info h4 {
            color: #374151;
            margin-bottom: 0.25rem;
        }

        .request-info p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.processed {
            background: #d1fae5;
            color: #065f46;
        }

        .request-message {
            background: #f9fafb;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 0.85rem;
            color: #4b5563;
            white-space: pre-wrap;
        }

        .request-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn-success {
            background: #10b981;
            color: #fff;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-success:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
        }

        .access-denied {
            text-align: center;
            padding: 4rem 2rem;
        }

        .access-denied h2 {
            color: #ef4444;
            margin-bottom: 1rem;
        }

        .refresh-btn {
            margin-left: auto;
        }
    </style>
</head>

<body>
    <header class="admin-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🎁 GiftOnScreen Admin</h1>
            <div>
                <button id="refreshBtn" class="btn btn-secondary refresh-btn" style="margin-right: 0.5rem;">
                    🔄 Refresh
                </button>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </header>

    <div class="container" id="admin-container">
        <div id="loading">
            <p style="text-align: center; color: #6b7280;">Loading...</p>
        </div>
    </div>

    <script type="module" src="./js/admin.js"></script>
</body>

</html>
