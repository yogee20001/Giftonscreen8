<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftOnScreen - Choose a Template</title>
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .template-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .template-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .template-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .template-info {
            padding: 1rem;
        }

        .template-info h3 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .template-info p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .premium-badge {
            display: inline-block;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #fff;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>GiftOnScreen</h1>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 0.5rem;">Choose a Template</h2>
        <p style="color: #666;">Select a template to create your personalized gift</p>

        <div id="template-list" class="template-grid"></div>
    </div>

    <script type="module" src="./js/index.js"></script>
</body>

</html>
