<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftOnScreen - Create Magical Moments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff4d8d;
            --primary-soft: #ff85a2;
            --primary-glow: rgba(255, 77, 141, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #0d0d1a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Ambient glow orbs */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .ambient-glow-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float 20s ease-in-out infinite;
        }

        .ambient-glow-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.3) 0%, transparent 70%);
            bottom: -50px;
            left: -50px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* Header */
        header {
            position: relative;
            z-index: 10;
            padding: 1.5rem;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header-content {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, var(--primary-soft) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        #logoutBtn {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.625rem 1.25rem;
            border: 1px solid var(--glass-border);
            border-radius: 9999px;
            background: var(--glass-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #logoutBtn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* Main Content */
        main {
            position: relative;
            z-index: 5;
            max-width: 480px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
            opacity: 0;
        }

        .hero-eyebrow {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--primary-soft);
            margin-bottom: 1rem;
            display: block;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.25rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* Template Grid */
        .templates-section {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
        }

        .templates-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .templates-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .templates-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        #template-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        /* Template Card - Glassmorphism */
        .template-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }

        .template-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .template-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 40px rgba(255, 77, 141, 0.1);
        }

        .template-card:hover::before {
            opacity: 1;
        }

        .template-card:active {
            transform: translateY(-2px) scale(0.99);
        }

        .template-thumbnail {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .template-card:hover .template-thumbnail {
            transform: scale(1.05);
        }

        .template-info {
            padding: 1.25rem;
        }

        .template-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.375rem;
        }

        .template-info p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 0.75rem;
            font-weight: 300;
        }

        .premium-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.2) 100%);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
            padding: 0.375rem 0.875rem;
            border-radius: 9999px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .premium-badge::before {
            content: '✦';
            font-size: 0.5rem;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem;
            border: 2px solid var(--glass-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 2rem 1.5rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
            color: #fca5a5;
            font-size: 0.875rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stagger animation for template cards */
        .template-card {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .template-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .template-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .template-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .template-card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .template-card:nth-child(5) {
            animation-delay: 0.5s;
        }

        .template-card:nth-child(6) {
            animation-delay: 0.6s;
        }

        /* Mobile optimization */
        @media (max-width: 480px) {
            .hero-title {
                font-size: 2rem;
            }

            .template-thumbnail {
                height: 140px;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            body {
                animation: none;
            }
        }
    </style>
</head>

<body>
    <!-- Ambient Glow Effects -->
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">GiftOnScreen</div>
            <button id="logoutBtn">Login</button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="hero">
            <span class="hero-eyebrow">Digital Gifting</span>
            <h1 class="hero-title">Create Magical Moments</h1>
            <p class="hero-subtitle">Choose a beautiful template and craft a personalized gift that touches hearts</p>
        </section>

        <!-- Templates Section -->
        <section class="templates-section">
            <div class="templates-header">
                <h2 class="templates-title">Choose a Template</h2>
                <span class="templates-count" id="templateCount"></span>
            </div>
            <div id="template-list">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Loading beautiful templates...</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="./js/index.js"></script>
</body>

</html>
