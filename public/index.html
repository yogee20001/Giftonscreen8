<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftOnScreen - Create Magical Moments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        /* Page-specific styles */
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background gradient */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0F0F14 0%, #1a0a2e 50%, #0F0F14 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Header */
        header {
            position: relative;
            z-index: 10;
            padding: 1.5rem;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header-content {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
        }

        #logoutBtn {
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.625rem 1.25rem;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-pill);
            background: var(--glass-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        #logoutBtn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
        }

        /* Main Content */
        main {
            position: relative;
            z-index: 5;
            max-width: 480px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
            opacity: 0;
        }

        .hero-eyebrow {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            display: block;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.25rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* Template Grid */
        .templates-section {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
        }

        .templates-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .templates-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .templates-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        #template-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        /* Template Card */
        .template-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(20px);
            position: relative;
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .template-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .template-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .template-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .template-card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .template-card:nth-child(5) {
            animation-delay: 0.5s;
        }

        .template-card:nth-child(6) {
            animation-delay: 0.6s;
        }

        .template-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .template-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: var(--glass-border-hover);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .template-card:hover::before {
            opacity: 1;
        }

        .template-card:active {
            transform: translateY(-2px) scale(0.99);
        }

        .template-thumbnail {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .template-card:hover .template-thumbnail {
            transform: scale(1.05);
        }

        .template-info {
            padding: 1.25rem;
        }

        .template-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.375rem;
        }

        .template-info p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 0.75rem;
            font-weight: 300;
        }

        .premium-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: linear-gradient(135deg, rgba(255, 182, 163, 0.2) 0%, rgba(255, 77, 141, 0.2) 100%);
            border: 1px solid rgba(255, 182, 163, 0.3);
            color: var(--accent-peach);
            padding: 0.375rem 0.875rem;
            border-radius: var(--radius-pill);
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .premium-badge::before {
            content: '✦';
            font-size: 0.5rem;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem;
            border: 2px solid var(--glass-border);
            border-top-color: var(--brand-pink);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(10px);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 2rem 1.5rem;
            background: var(--error-light);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-md);
            color: #fca5a5;
            font-size: 0.875rem;
        }

        /* Mobile optimization */
        @media (max-width: 480px) {
            .hero-title {
                font-size: 2rem;
            }

            .template-thumbnail {
                height: 140px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>

    <!-- Ambient Glow Effects -->
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">GiftOnScreen</div>
            <div id="userMenuContainer"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="hero">
            <span class="hero-eyebrow">Digital Gifting</span>
            <h1 class="hero-title">Create Magical Moments</h1>
            <p class="hero-subtitle">Choose a beautiful template and craft a personalized gift that touches hearts</p>
        </section>

        <!-- Templates Section -->
        <section class="templates-section">
            <div class="templates-header">
                <h2 class="templates-title">Choose a Template</h2>
                <span class="templates-count" id="templateCount"></span>
            </div>
            <div id="template-list">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Loading beautiful templates...</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="./js/index.js"></script>
</body>

</html>
