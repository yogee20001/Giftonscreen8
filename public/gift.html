<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift For You - GiftOnScreen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            overflow-x: hidden;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0F0F14 0%, #1a0a2e 50%, #0F0F14 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Ambient particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-glow);
            border-radius: 50%;
            animation: float-up 15s linear infinite;
            opacity: 0;
        }

        .particle:nth-child(1) {
            left: 10%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            left: 30%;
            animation-delay: 2s;
        }

        .particle:nth-child(3) {
            left: 50%;
            animation-delay: 4s;
        }

        .particle:nth-child(4) {
            left: 70%;
            animation-delay: 1s;
        }

        .particle:nth-child(5) {
            left: 90%;
            animation-delay: 3s;
        }

        .particle:nth-child(6) {
            left: 20%;
            animation-delay: 5s;
        }

        .particle:nth-child(7) {
            left: 60%;
            animation-delay: 7s;
        }

        .particle:nth-child(8) {
            left: 80%;
            animation-delay: 6s;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* Container */
        .gift-container {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            max-width: 520px;
            margin: 0 auto;
        }

        /* Heart Icon */
        .heart-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-main);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 60px rgba(255, 77, 141, 0.4);
            animation: heart-beat 2s ease-in-out infinite, float-in 1s ease-out 0.5s both;
        }

        @keyframes heart-beat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes float-in {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Receiver Label */
        .receiver-label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1s forwards;
        }

        /* Receiver Name */
        .receiver-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1.3s forwards;
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 1px;
            background: var(--gradient-main);
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1.6s forwards;
        }

        /* Message */
        .message {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-style: italic;
            text-align: center;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1.9s forwards;
        }

        /* Sender */
        .sender-section {
            text-align: center;
            opacity: 0;
            animation: fadeInUp 0.8s ease 2.2s forwards;
        }

        .sender-label {
            font-size: 0.6875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .sender-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Action Button */
        .action-section {
            margin-top: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 2.5s forwards;
        }

        .btn-create {
            padding: 1rem 2.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-pill);
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-create:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
        }

        /* Footer */
        .gift-footer {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease 3s forwards;
        }

        .gift-footer p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .gift-footer a {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            font-weight: 500;
        }

        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .loading-heart {
            width: 60px;
            height: 60px;
            background: var(--gradient-main);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .loading-text {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        @keyframes pulse-text {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 2rem;
        }

        .error-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .error-state p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .receiver-name {
                font-size: 2rem;
            }

            .message {
                font-size: 1.125rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            body {
                animation: fadeIn 0.5s ease forwards;
            }
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>

    <!-- Ambient Effects -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>

    <!-- Gift Content -->
    <div class="gift-container" id="giftContent">
        <div class="loading-state">
            <div class="loading-heart">💝</div>
            <p class="loading-text">Unwrapping your gift...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="gift-footer">
        <p>Created with <a href="index.html">GiftOnScreen</a></p>
    </footer>

    <script type="module">
        import { getGift } from '../core/api.js';

        const urlParams = new URLSearchParams(window.location.search);
        const giftId = urlParams.get('id');
        const contentDiv = document.getElementById('giftContent');

        async function loadGift() {
            if (!giftId) {
                showError('Gift not found', 'The gift link appears to be invalid.');
                return;
            }

            try {
                const { gift, error } = await getGift(giftId);

                if (error || !gift) {
                    showError('Gift not found', 'This gift may have expired or been removed.');
                    return;
                }

                renderGift(gift);
            } catch (err) {
                console.error('Error loading gift:', err);
                showError('Something went wrong', 'Unable to load the gift. Please try again later.');
            }
        }

        function renderGift(gift) {
            contentDiv.innerHTML = `
                <div class="heart-icon">💝</div>
                <div class="receiver-label">A Special Gift For</div>
                <h1 class="receiver-name">${escapeHtml(gift.receiver)}</h1>
                <div class="divider"></div>
                <p class="message">"${escapeHtml(gift.message)}"</p>
                <div class="sender-section">
                    <div class="sender-label">With love from</div>
                    <div class="sender-name">${escapeHtml(gift.sender)}</div>
                </div>
                <div class="action-section">
                    <a href="create.html" class="btn-create">
                        <span>✨</span>
                        Create Your Own Gift
                    </a>
                </div>
            `;
        }

        function showError(title, message) {
            contentDiv.innerHTML = `
                <div class="error-state">
                    <div class="heart-icon" style="background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);">😔</div>
                    <h2>${escapeHtml(title)}</h2>
                    <p>${escapeHtml(message)}</p>
                    <a href="index.html" class="btn-create">Browse Templates</a>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load gift with slight delay for dramatic effect
        setTimeout(loadGift, 1500);
    </script>
</body>

</html>
